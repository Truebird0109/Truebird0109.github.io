---
layout: default
---
<a href="/" class="back-link">back to home</a>

<article>
  <div class="post-header">
    <h1>{{ page.title }}</h1>
    <div class="post-meta">{{ page.date | date: "%Y-%m-%d" }}{% if page.categories %} | {{ page.categories | join: ", " }}{% endif %}</div>
    {% if page.tags %}
    <div class="post-tags">
      {% for tag in page.tags %}
      <span class="tag">#{{ tag }}</span>
      {% endfor %}
    </div>
    {% endif %}
  </div>

  <div class="post-content">
    {{ content }}
  </div>
</article>
